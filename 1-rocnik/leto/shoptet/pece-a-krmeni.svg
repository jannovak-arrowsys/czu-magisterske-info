      <stop offset="0%" stop-color="#FFD166" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="140" height="100" rx="6" fill="url(#bg0)"/>
  
  <!-- Honeycomb cells -->
  <polygon points="35,20 45,14 55,20 55,32 45,38 35,32" fill="none" stroke="#FF6B35" stroke-width="2"/>
  <polygon points="55,20 65,14 75,20 75,32 65,38 55,32" fill="none" stroke="#FF6B35" stroke-width="2"/>
  <polygon points="45,38 55,32 65,38 65,50 55,56 45,50" fill="#FFD166" stroke="#FF6B35" stroke-width="2"/>
  <polygon points="25,38 35,32 45,38 45,50 35,56 25,50" fill="none" stroke="#FF6B35" stroke-width="2"/>
  <polygon points="65,38 75,32 85,38 85,50 75,56 65,50" fill="none" stroke="#FF6B35" stroke-width="2"/>
  <!-- Bee -->
  <ellipse cx="55" cy="44" rx="5" ry="7" fill="#FFD166"/>
  <line x1="55" y1="44" x2="55" y2="48" stroke="#333" stroke-width="1"/>
  <line x1="55" y1="46" x2="58" y2="43" stroke="#333" stroke-width="1"/>
  <line x1="55" y1="46" x2="52" y2="43" stroke="#333" stroke-width="1"/>
  <!-- Feeder drop -->
  <ellipse cx="100" cy="35" rx="14" ry="18" fill="#FFD166" opacity="0.8"/>
