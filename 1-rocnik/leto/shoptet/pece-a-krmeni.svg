  <ellipse cx="100" cy="65" rx="5" ry="3" fill="#FF6B35" opacity="0.6"/>

  <text x="70" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#FF6B35">Péče a krmení</text>
