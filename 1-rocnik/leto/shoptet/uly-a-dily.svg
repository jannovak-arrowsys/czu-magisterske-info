<svg xmlns="http://www.w3.org/2000/svg" width="140" height="100" viewBox="0 0 140 100">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A8D5A2" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6B9E5E" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="140" height="100" rx="6" fill="url(#bg2)"/>
  
  <!-- Hive body stack -->
  <rect x="25" y="55" width="60" height="12" rx="2" fill="#8B5E3C"/>
  <rect x="22" y="42" width="66" height="15" rx="2" fill="#A0703C"/>
  <rect x="25" y="28" width="60" height="16" rx="2" fill="#8B5E3C"/>
  <!-- Roof -->
  <polygon points="18,28 92,28 85,18 25,18" fill="#6B9E5E"/>
  <rect x="18" y="26" width="74" height="4" rx="1" fill="#5A8A4E"/>
  <!-- Entrance -->
  <rect x="42" y="63" width="26" height="4" rx="1" fill="#5A3010"/>
  <!-- Landing board -->
  <rect x="35" y="67" width="40" height="3" rx="1" fill="#8B5E3C"/>
  <!-- Frame lines -->
  <line x1="40" y1="30" x2="40" y2="42" stroke="#5A3010" stroke-width="1.5"/>
  <line x1="55" y1="30" x2="55" y2="42" stroke="#5A3010" stroke-width="1.5"/>
  <line x1="70" y1="30" x2="70" y2="42" stroke="#5A3010" stroke-width="1.5"/>
  <!-- Bees -->
  <circle cx="100" cy="30" r="4" fill="#FFD166"/>
  <line x1="100" y1="26" x2="105" y2="22" stroke="#666" stroke-width="1"/>
  <line x1="100" y1="26" x2="95" y2="22" stroke="#666" stroke-width="1"/>
  <circle cx="112" cy="50" r="3" fill="#FFD166"/>

  <text x="70" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#6B9E5E">Úly a díly</text>
</svg>