<svg xmlns="http://www.w3.org/2000/svg" width="140" height="100" viewBox="0 0 140 100">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4A261" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E07000" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="140" height="100" rx="6" fill="url(#bg1)"/>
  
  <!-- Smoker body -->
  <rect x="30" y="35" width="22" height="30" rx="4" fill="#E07000"/>
  <rect x="28" y="32" width="26" height="8" rx="3" fill="#B35500"/>
  <!-- Smoker spout -->
  <rect x="48" y="25" width="8" height="18" rx="2" fill="#B35500"/>
  <!-- Smoke -->
  <path d="M52 25 Q55 18 50 12 Q47 8 52 4" stroke="#ccc" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M56 22 Q60 15 55 10 Q52 6 56 2" stroke="#ddd" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Bellows -->
  <ellipse cx="29" cy="52" rx="8" ry="14" fill="#F4A261" stroke="#E07000" stroke-width="1"/>
  <!-- Hive tool -->
  <rect x="75" y="20" width="6" height="55" rx="2" fill="#B35500" transform="rotate(-20, 78, 47)"/>
  <rect x="73" y="60" width="10" height="6" rx="1" fill="#E07000" transform="rotate(-20, 78, 63)"/>
  <!-- Bee brush -->
  <rect x="100" y="22" width="4" height="42" rx="2" fill="#8B5E3C"/>
  <rect x="98" y="58" width="8" height="12" rx="1" fill="#F4A261"/>
  <!-- Bristles -->
  <line x1="98" y1="62" x2="93" y2="68" stroke="#F4A261" stroke-width="1"/>
  <line x1="98" y1="64" x2="93" y2="70" stroke="#F4A261" stroke-width="1"/>
  <line x1="106" y1="62" x2="111" y2="68" stroke="#F4A261" stroke-width="1"/>
  <line x1="106" y1="64" x2="111" y2="70" stroke="#F4A261" stroke-width="1"/>

  <text x="70" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#E07000">Včelařské potřeby</text>
</svg>